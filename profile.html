<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your account, view order history and track orders at Shree Panchmukhi Balaji Handloom.">
    <title>My Account | Shree Panchmukhi Balaji Handloom</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/favicon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/animation.css">

    <style>
        /* Profile Page Layout */
        .page-top { padding: 120px 0 40px; background: var(--bg-secondary); text-align: center; }
        .page-top h1 { font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 8px; }
        .page-top p { color: var(--text-secondary); }

        .profile-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            padding: 60px 0;
            align-items: start;
        }

        /* Profile Sidebar Card */
        .profile-sidebar-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            text-align: center;
            position: sticky;
            top: 100px;
        }
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--primary);
            cursor: pointer;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity var(--transition-fast);
            color: #fff; font-size: 1.2rem;
        }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        #avatarUploadInput { display: none; }

        .profile-sidebar-card h2 { font-size: 1.4rem; margin-bottom: 4px; }
        .profile-sidebar-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 4px; }
        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .profile-edit-form { text-align: left; }
        .profile-edit-form .form-group { margin-bottom: 16px; }
        
        .sidebar-actions {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sidebar-actions a, .sidebar-actions button {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; border-radius: 12px; width: 100%;
            font-weight: 500; transition: all var(--transition-fast);
            color: var(--text-secondary); background: var(--bg-secondary);
        }
        .sidebar-actions a:hover { background: var(--bg-primary); color: var(--text-primary); }
        .sidebar-actions button.logout { color: #FF3B30; background: rgba(255, 59, 48, 0.05); }
        .sidebar-actions button.logout:hover { background: rgba(255, 59, 48, 0.1); }

        /* Orders Section */
        .orders-section {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            padding: 30px;
        }
        .orders-section h2 { font-family: var(--font-heading); margin-bottom: 30px; font-size: 1.5rem; }

        .order-card {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: box-shadow var(--transition-fast);
        }
        .order-card:hover { box-shadow: var(--shadow-sm); }
        .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .order-card-header h4 { font-size: 1rem; }
        .order-date { font-size: 0.85rem; color: var(--text-muted); }
        
        .order-card-body { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .order-item-preview { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: var(--text-secondary); }
        .order-item-preview img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        
        .order-card-footer { display: flex; justify-content: space-between; align-items: center; }
        .order-total-amount { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); }

        /* Unauth State */
        .unauth-state {
            display: none; /* Toggled by JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px;
            min-height: 50vh;
        }
        .unauth-state i { font-size: 4rem; color: var(--border-color); margin-bottom: 24px; }

        @media (max-width: 768px) {
            .profile-layout { grid-template-columns: 1fr; }
            .profile-sidebar-card { position: static; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header scrolled" id="header">
        <div class="container">
            <nav class="nav">
                <a href="/index.html" class="logo">Shree <span>Panchmukhi</span> Balaji</a>
                <div class="nav-actions">
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
                    <a href="/index.html" class="btn btn-sm btn-secondary">Home</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="page-top">
        <div class="container">
            <h1>My Account</h1>
            <p>Manage your profile and view your order history</p>
        </div>
    </div>

    <main class="container">
        
        <!-- If User is NOT Logged In -->
        <div class="unauth-state" id="authSection">
            <i class="fas fa-lock"></i>
            <h2>Please Login</h2>
            <p style="color: var(--text-muted); margin-bottom: 24px;">You need to be logged in to view your profile.</p>
            <a href="/login.html" class="btn btn-primary">Login / Sign Up</a>
        </div>

        <!-- If User IS Logged In -->
        <div class="profile-layout" id="profileSection" style="display: none;">
            
            <!-- Left Sidebar -->
            <aside class="profile-sidebar-card">
                <div class="avatar-container" onclick="document.getElementById('avatarUploadInput').click()" title="Change Profile Photo">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=D4AF37&color=000" alt="User Avatar">
                    <div class="avatar-overlay"><i class="fas fa-camera"></i></div>
                    <input type="file" id="avatarUploadInput" accept="image/*">
                </div>
                
                <h2 id="userName">Loading...</h2>
                <p id="userEmail">email@example.com</p>
                <span class="role-badge" id="userRole">Customer</span>

                <form class="profile-edit-form" id="profileForm">
                    <div class="form-group">
                        <label for="editNameInput">Full Name</label>
                        <input type="text" id="editNameInput" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm" style="width: 100%;" id="saveProfileBtn">Save Changes</button>
                </form>

                <div class="sidebar-actions">
                    <a href="/admin.html" id="adminPanelLink" style="display: none;">
                        <i class="fas fa-shield-alt"></i> Admin Panel
                    </a>
                    <button class="logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Right: Orders -->
            <section class="orders-section">
                <h2>Order History</h2>
                <div id="ordersListContainer">
                    <!-- Populated by profile.js -->
                </div>
            </section>

        </div>
    </main>

    <script type="module" src="/js/profile.js"></script>
    
    <!-- Inner page theme toggle -->
    <script type="module">
        const themeToggle = document.getElementById('themeToggle');
        if(themeToggle) {
            const initTheme = () => {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                themeToggle.querySelector('i').className = savedTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
            };
            initTheme();
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.querySelector('i').className = newTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
            });
        }
    </script>
</body>
</html>
