<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an account at Shree Panchmukhi Balaji Handloom for a premium handloom shopping experience.">
    <title>Sign Up | Shree Panchmukhi Balaji Handloom</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/assets/icons/favicon.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/animation.css">
    
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
        }
        .auth-bg-shape {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            z-index: 0;
        }
        .shape-1 { top: -100px; right: -100px; }
        .shape-2 { bottom: -100px; left: -100px; }
    </style>
</head>
<body>
    <!-- Background Shapes -->
    <div class="auth-bg-shape shape-1" aria-hidden="true"></div>
    <div class="auth-bg-shape shape-2" aria-hidden="true"></div>

    <div class="auth-container">
        <div class="auth-card animate-scaleIn">
            <!-- Logo -->
            <a href="/index.html" class="logo" style="justify-content: center; display: flex; margin-bottom: 32px; font-size: 1.6rem;">
                Shree <span>Panchmukhi</span> Balaji
            </a>

            <h2>Create Account</h2>
            <p>Join us for an exclusive handloom experience</p>

            <!-- Signup Form -->
            <form id="signupForm" novalidate>
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-control" placeholder="e.g. Priya Sharma" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="Min. 6 characters" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="form-control" placeholder="Repeat your password" required aria-required="true">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Create Account <i class="fas fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-divider">or sign up with</div>

            <!-- Google Auth -->
            <button id="googleSignupBtn" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/24px-Google_%22G%22_logo.svg.png" alt="Google Icon" width="20" height="20">
                Sign Up with Google
            </button>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Login</a>
            </div>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
</body>
</html>
